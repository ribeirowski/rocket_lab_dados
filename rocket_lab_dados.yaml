resources:
  jobs:
    rocket_lab_dados:
      name: rocket_lab_dados
      schedule:
        quartz_cron_expression: 44 0 13 * * ?
        timezone_id: America/Recife
        pause_status: UNPAUSED
      tasks:
        - task_key: Bronze
          notebook_task:
            notebook_path: /Workspace/Users/ehnr@cin.ufpe.br/visagio/Atividade_land_to_bronze
            source: WORKSPACE
        - task_key: Silver
          depends_on:
            - task_key: Bronze
          notebook_task:
            notebook_path: /Workspace/Users/ehnr@cin.ufpe.br/visagio/Atividade_bronze_to_silver
            source: WORKSPACE
        - task_key: Gold
          depends_on:
            - task_key: Silver
          notebook_task:
            notebook_path: /Workspace/Users/ehnr@cin.ufpe.br/visagio/Atividade_silver_to_gold
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
